services:
  shark-quant:
    build: 
      context: .
      dockerfile: Dockerfile
    image: shark-quant:latest
    container_name: shark-quant-bot
    restart: unless-stopped
    ports:
      - "8002:8002"  # Dashboard and API
    volumes:
      # rw：Darwin 补丁与仪表盘「保存配置」会写回 settings.yaml；若用 :ro 会报 Errno 30 Read-only file system
      - ./config/settings.yaml:/app/config/settings.yaml
      - ./logs:/app/logs  # Persist logs
      - ./license:/app/license:ro # Mount license
    environment:
      - TZ=UTC
      - NODE_ENV=production
      # Paper / dev: set to 1 if license file is expired but you only need mainnet feed + dashboard
      - SKIP_LICENSE_CHECK=1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - quant_net

  # 独立批量回测（默认 beta_neutral_hf.symbols）；不随主 bot 重启
  # 用法: docker compose --profile backtest run --rm backtest-worker
  backtest-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: shark-quant:latest
    profiles: ["backtest"]
    working_dir: /app
    command: ["python3", "backtest_worker.py", "--days", "7", "--insecure"]
    volumes:
      - ./config/settings.yaml:/app/config/settings.yaml
      - ./data:/app/data
    environment:
      - TZ=UTC
      - BACKTEST_INSECURE_SSL=1
    networks:
      - quant_net

  redis:
    image: redis:7.2-alpine
    container_name: shark-quant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - quant_net

volumes:
  redis_data:

networks:
  quant_net:
    driver: bridge
