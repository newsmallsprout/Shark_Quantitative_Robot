services:
  shark:
    build: .
    container_name: shark2
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
